# ----------------------------------------------------------------------
# docker-compose.yml — піднімає три контейнери:
#   1) db    — PostgreSQL 16 з постійним volume для даних
#   2) redis — Redis 7 для зберігання лічильників rate-limiter-а
#   3) api   — наш FastAPI-застосунок (збирається з Dockerfile)
#
# Запуск:
#   docker compose up --build
#
# API буде доступне на http://localhost:8000/docs
# ----------------------------------------------------------------------
services:

  db:
    image: postgres:16-alpine
    container_name: library_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_pass
      POSTGRES_DB: library_db
    volumes:
      # Постійне сховище — дані не зникають між перезапусками контейнера.
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: library_redis
    restart: unless-stopped
    # Redis тримає дані в пам'яті — для rate-limiter-а нам не потрібен volume
    # (лічильники самі собою тимчасові: TTL 60 секунд).
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://library_user:library_pass@db:5432/library_db
      # ---- Redis для Rate Limiter ----
      REDIS_URL: redis://redis:6379/0
      # ---- JWT-конфігурація ----
      # У продакшні JWT_SECRET_KEY має бути довгим випадковим рядком (32+ байт).
      # Згенерувати:    openssl rand -hex 32
      JWT_SECRET_KEY: "change-me-to-a-random-32-byte-string-in-prod-please"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
    ports:
      - "8000:8000"

volumes:
  pg_data:
