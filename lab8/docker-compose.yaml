services:
  prism:
    image: stoplight/prism:5
    platform: linux/amd64
    container_name: library_mock_prism
    ports:
      - "4010:4010"
    volumes:
      - ./openapi.yaml:/tmp/openapi.yaml:ro
    command: >
      mock
      -h 0.0.0.0
      -p 4010
      -m false
      /tmp/openapi.yaml
    restart: unless-stopped
