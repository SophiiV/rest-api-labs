# ----------------------------------------------------------------------
# docker-compose.yml — піднімає два контейнери:
#   1) db   — PostgreSQL 16 з постійним volume для даних
#   2) api  —  FastAPI-застосунок (збирається з Dockerfile)
#
# Запуск:
#   docker compose up --build
#
# API доступне на http://localhost:8000/docs
# ----------------------------------------------------------------------
services:

  db:
    image: postgres:16-alpine
    container_name: library_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_pass
      POSTGRES_DB: library_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://library_user:library_pass@db:5432/library_db
    ports:
      - "8000:8000"

volumes:
  pg_data:
